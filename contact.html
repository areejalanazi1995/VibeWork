<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>اتصل بنا | VibeWork</title>

  <style>

    :root {
      --burgundy: #7B1E3A;
      --sage: #6B8F71;
      --cream: #F7F4EF;
      --gold: #D4AF37;
      --text: #2F2F2F;
    }

    * {
      box-sizing: border-box;
      font-family: "Tahoma", sans-serif;
    }

    body {
      margin: 0;
      background:
        linear-gradient(
          135deg,
          #F7F4EF,
          #fff
        );

      color: var(--text);
    }

    #header,
    #footer {
      width: 100%;
    }

    .contact-page {

      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 80px 7%;
    }

    .contact-card {

      width: 100%;
      max-width: 1100px;

      background: rgba(255,255,255,0.82);

      backdrop-filter: blur(16px);

      border-radius: 40px;

      overflow: hidden;

      display: grid;
      grid-template-columns: 1fr 1fr;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.08);

      border:
        1px solid rgba(123,30,58,0.08);
    }

    .contact-info {

      background:
        linear-gradient(
          135deg,
          var(--burgundy),
          #9b2a4c
        );

      color: white;

      padding: 60px;
    }

    .contact-info h1 {
      margin-top: 0;
      font-size: 42px;
    }

    .contact-info p {
      line-height: 2;
      opacity: 0.9;
    }

    .info-box {
      margin-top: 40px;
    }

    .info-item {
      margin-bottom: 18px;
      font-size: 15px;
    }

    .contact-form {
      padding: 60px;
    }

    .contact-form h2 {
      color: var(--burgundy);
      margin-top: 0;
      font-size: 34px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .form-group input,
    .form-group textarea {

      width: 100%;

      padding: 16px;

      border-radius: 18px;

      border:
        1px solid rgba(123,30,58,0.12);

      background: #fff;

      outline: none;

      transition: 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {

      border-color: var(--sage);

      box-shadow:
        0 0 0 4px rgba(107,143,113,0.10);
    }

    .form-group textarea {
      resize: none;
      height: 140px;
    }

    .submit-btn {

      background:
        linear-gradient(
          135deg,
          var(--burgundy),
          #9b2a4c
        );

      color: white;

      border: none;

      padding: 15px 30px;

      border-radius: 30px;

      cursor: pointer;

      font-size: 15px;
      font-weight: bold;

      transition: 0.3s;

      box-shadow:
        0 10px 20px rgba(123,30,58,0.18);
    }

    .submit-btn:hover {

      transform: translateY(-3px);

      box-shadow:
        0 14px 26px rgba(123,30,58,0.24);
    }

    @media (max-width: 900px) {

      .contact-card {
        grid-template-columns: 1fr;
      }

      .contact-info,
      .contact-form {
        padding: 40px;
      }

    }

  </style>

</head>

<body>

  <div id="header"></div>

  <section class="contact-page">

    <div class="contact-card">

      <div class="contact-info">

        <h1>تواصل معنا</h1>

        <p>
          نحن هنا لمساعدتك وتطوير بيئة عملك
          بطريقة أكثر تحفيزًا واحترافية.
        </p>

        <div class="info-box">

          <div class="info-item">
            📧 info@vibework.com
          </div>

          <div class="info-item">
            📍 المملكة العربية السعودية
          </div>

          <div class="info-item">
            ☎ +966 50 000 0000
          </div>

        </div>

      </div>

      <div class="contact-form">

        <h2>أرسل رسالتك</h2>

        <div class="form-group">
          <label>الاسم الكامل</label>
          <input type="text">
        </div>

        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email">
        </div>

        <div class="form-group">
          <label>رسالتك</label>
          <textarea></textarea>
        </div>

        <button class="submit-btn">
          إرسال الرسالة
        </button>

      </div>

    </div>

  </section>

  <div id="footer"></div>

  <script>

    async function loadPart(id, file) {

      try {

        const response = await fetch(file);

        if (!response.ok) {
          throw new Error(`فشل تحميل ${file}`);
        }

        const html = await response.text();

        document.getElementById(id).innerHTML = html;

        if (id === "header") {

          initializeHeader();

        }

      } catch (error) {

        console.error("خطأ:", error);

      }

    }

    function initializeHeader() {

      const menuBtn = document.getElementById("menuBtn");
      const navMenu = document.getElementById("navMenu");

      if (menuBtn && navMenu) {

        menuBtn.addEventListener("click", function () {

          navMenu.classList.toggle("active");

        });

      }

    }

    document.addEventListener("DOMContentLoaded", function () {

      loadPart("header", "header.html");
      loadPart("footer", "footer.html");

    });

  </script>

</body>

</html>
